<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a3824">
    <title>Solitaire</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
            "imports": {
                "./game.js": "./game.js",
                "./ui.js": "./ui.js",
                "./drag.js": "./drag.js",
                "./sound.js": "./sound.js"
            }
        }
    </script>
</head>
<body>
    <div id="game-container">
        <div class="top-bar">
            <div id="stock-waste-container">
                <div id="stock">
                    <div class="stock-pile pile" data-pile="stock"></div>
                </div>
                <div id="waste">
                    <div class="waste-pile pile" data-pile="waste"></div>
                </div>
            </div>
            <div id="foundations">
                <div class="foundation-pile pile" data-pile="foundation-0"></div>
                <div class="foundation-pile pile" data-pile="foundation-1"></div>
                <div class="foundation-pile pile" data-pile="foundation-2"></div>
                <div class="foundation-pile pile" data-pile="foundation-3"></div>
            </div>
        </div>

        <div id="tableau">
            <div class="tableau-pile pile" data-pile="tableau-0"></div>
            <div class="tableau-pile pile" data-pile="tableau-1"></div>
            <div class="tableau-pile pile" data-pile="tableau-2"></div>
            <div class="tableau-pile pile" data-pile="tableau-3"></div>
            <div class="tableau-pile pile" data-pile="tableau-4"></div>
            <div class="tableau-pile pile" data-pile="tableau-5"></div>
            <div class="tableau-pile pile" data-pile="tableau-6"></div>
        </div>

        <div class="bottom-bar">
             <div id="game-menu">
                <button id="new-game-btn">New Game</button>
            </div>
        </div>
    </div>

    <div id="win-screen" class="hidden">
        <div class="win-message">
            <h1>You Won!</h1>
            <p>Congratulations!</p>
            <button id="win-new-game-btn">Play Again</button>
        </div>
    </div>

    <script type="module" src="main.js"></script>

</body>
</html>
